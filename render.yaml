services:
  - type: web
    name: healthiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/migrate.py && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthiq-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard after deploy
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after frontend deploys
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: FHIR_SERVER_URL
        value: https://hapi.fhir.org/baseR4

databases:
  - name: healthiq-db
    databaseName: healthiq_db
    user: healthiq
    plan: free
