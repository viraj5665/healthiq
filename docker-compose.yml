services:
  db:
    image: postgres:16-alpine
    container_name: healthiq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthiq
      POSTGRES_PASSWORD: healthiq_password
      POSTGRES_DB: healthiq_db
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthiq -d healthiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: healthiq_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://healthiq:healthiq_password@db:5432/healthiq_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./analytics:/app/analytics
      - ./data:/app/data

volumes:
  postgres_data:
